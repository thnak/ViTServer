# Tiny config for a quick smoke-test (CPU, no GPU required)
# Run: python train.py --config configs/smoke_test.yaml --device cpu --no-val

model:
  img_size: 64
  in_channels: 3
  base_channels: 8
  embed_dim: 32
  num_heads: 2
  num_encoder_layers: 1
  num_decoder_layers: 2
  num_queries: 10
  num_classes: 3
  dropout: 0.0
  aux_loss: false

training:
  epochs: 2
  batch_size: 2
  grad_accumulate: 1
  optimizer: adamw
  lr: 1.0e-4
  lr_backbone: 1.0e-5
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  warmup_epochs: 0
  ema: false
  ema_decay: 0.9999
  amp: false
  clip_grad_norm: 0.1

loss:
  cls_weight: 2.0
  bbox_weight: 5.0
  giou_weight: 2.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  matcher_cls_weight: 2.0
  matcher_bbox_weight: 5.0
  matcher_giou_weight: 2.0

data:
  train_ann: annotations/instances_train2017.json
  val_ann: annotations/instances_val2017.json
  train_img_dir: images/train2017
  val_img_dir: images/val2017
  num_workers: 0
  pin_memory: false

logging:
  project: smoke_test
  save_dir: runs/
  save_period: 1
  val_period: 1
