# ViTServer — small tier (3.6 M params, 43.8 GFLOPs @ 640×640)
# Target: Edge server — Jetson AGX Orin (TRT INT8, near-real-time)
# Train: python train.py --config configs/small.yaml --device cuda

model:
  img_size: 640
  in_channels: 3
  base_channels: 32
  embed_dim: 128
  num_heads: 4
  encoder_type: none
  num_encoder_layers: 0
  window_size: 8
  num_decoder_layers: 6
  num_queries: 300
  num_classes: 80
  dropout: 0.0
  aux_loss: true

training:
  epochs: 500
  batch_size: 8
  grad_accumulate: 4             # effective batch = 32
  optimizer: adamw
  lr: 1.0e-4
  lr_backbone: 1.0e-5
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  warmup_epochs: 10
  ema: true
  ema_decay: 0.9999
  amp: true
  clip_grad_norm: 0.1

loss:
  cls_weight: 2.0
  bbox_weight: 5.0
  giou_weight: 2.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  matcher_cls_weight: 2.0
  matcher_bbox_weight: 5.0
  matcher_giou_weight: 2.0

data:
  train_ann: annotations/instances_train2017.json
  val_ann: annotations/instances_val2017.json
  train_img_dir: images/train2017
  val_img_dir: images/val2017
  num_workers: 8
  pin_memory: true

logging:
  project: small
  save_dir: runs/
  save_period: 10
  val_period: 5
